server:
  port: 8080

routes:
  - path: /api/users
    upstreams:
      - http://localhost:9001
      - http://localhost:9002
  - path: /api/orders
    upstreams:
      - http://localhost:9002
      - http://localhost:9003
  - path: /api/payments
    upstreams:
      - http://localhost:9003
      - http://localhost:9001

rateLimitPerMinute: 60

loadBalancerStrategy: round-robin

connectionPool:
  connectTimeoutSeconds: 5
  requestTimeoutSeconds: 10

circuitBreaker:
  failureThreshold: 5
  recoveryTimeMs: 30000

retryPolicy:
  maxRetries: 3
  initialDelayMs: 1000
  backoffMultiplier: 2.0

timeouts:
  readSeconds: 30
  writeSeconds: 30

cors:
  allowedOrigins:
    - "*"
  allowedMethods:
    - GET
    - POST
    - PUT
    - DELETE
  allowedHeaders:
    - Content-Type
    - Authorization
